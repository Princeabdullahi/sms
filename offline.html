<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fffaf3;
        color: #2f241d;
        padding: 24px;
      }
      .card {
        max-width: 360px;
        text-align: center;
        background: white;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 12px 32px rgba(0,0,0,.12);
      }
      h1 { margin-bottom: 8px; }
      p { color: #6b5a4f; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>The app shell is available, but the GOA links need an internet connection. Please reconnect and try again.</p>
    </div>
  </body>
</html>
