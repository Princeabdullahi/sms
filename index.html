<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8b5e3c" />
    <meta name="description" content="Golden Olives Academy official links" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <title>Golden Olives Academy</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/icon.png" />
    <style>
      :root {
        --bg: #fffaf3;
        --card: #ffffff;
        --primary: #8b5e3c;
        --primary-dark: #6b4226;
        --text: #2f241d;
        --muted: #6b5a4f;
        --shadow: 0 10px 30px rgba(37, 22, 8, 0.12);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #fff8eb 0%, var(--bg) 100%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      .app-shell {
        width: min(100%, 480px);
        background: var(--card);
        border-radius: 24px;
        box-shadow: var(--shadow);
        padding: 28px;
        text-align: center;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 700;
        background: #f3e2c8;
        color: var(--primary-dark);
        margin-bottom: 16px;
      }

      .status-pill::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #2f9f61;
      }

      .status-pill.offline::before { background: #d9534f; }

      .logo {
        width: 112px;
        height: 112px;
        margin: 0 auto 16px;
        border-radius: 24px;
        overflow: hidden;
        background: #fff;
        box-shadow: inset 0 4px 12px rgba(255,255,255,.35);
      }

      .logo img { width: 100%; height: 100%; object-fit: cover; display: block; }

      h1 { margin: 0 0 8px; font-size: 1.8rem; }
      p { margin: 0 0 20px; color: var(--muted); line-height: 1.5; }

      .buttons { display: grid; gap: 12px; }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        border: none;
        border-radius: 999px;
        padding: 14px 16px;
        font-size: 1rem;
        font-weight: 700;
        color: white;
        text-decoration: none;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        -webkit-tap-highlight-color: transparent;
      }

      .btn:hover { transform: translateY(-2px); }
      .btn:active { transform: translateY(0); }

      .btn-website { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
      .btn-facebook { background: #1877f2; }
      .btn-twitter { background: #000000; }
      .btn-instagram { background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7); }

      .footer {
        margin-top: 18px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .modal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(15, 18, 21, 0.72);
        z-index: 1000;
      }

      .modal.hidden { display: none; }

      .modal-card {
        background: var(--card);
        border-radius: 24px;
        padding: 24px;
        width: min(100%, 360px);
        box-shadow: var(--shadow);
      }

      .modal-card h2 { margin-top: 0; }

      @media (max-width: 480px) {
        .app-shell { padding: 24px; }
        h1 { font-size: 1.55rem; }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <div class="status-pill" id="network-status">Online</div>
      <div class="logo" aria-label="GOA logo">
        <img src="assets/icon.png" alt="Golden Olives Academy logo" />
      </div>
      <h1>Golden Olives Academy</h1>
      <p>Access GOA quickly and conveniently from your device.</p>

      <div class="buttons">
        <a class="btn btn-website" data-link="website" href="#">🌐 Sign in</a>
        <a class="btn btn-facebook" data-link="facebook" href="#">📘 Facebook</a>
        <a class="btn btn-twitter" data-link="twitter" href="#">𝕏 Twitter</a>
        <a class="btn btn-instagram" data-link="instagram" href="#">📸 Instagram</a>
      </div>

      <p class="footer">Fast access to GOA anytime, even when your connection is limited.</p>
    </main>

    <div id="offline-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="offline-title">
      <div class="modal-card">
        <h2 id="offline-title">Network unavailable</h2>
        <p>You are offline. Reconnect to open GOA links from this app.</p>
        <button class="btn btn-website" id="retry-btn" type="button">Try again</button>
      </div>
    </div>

    <script src="./config.js"></script>
    <script>
      const links = window.goaLinks || {};
      const statusEl = document.getElementById('network-status');
      const offlineModal = document.getElementById('offline-modal');
      const retryBtn = document.getElementById('retry-btn');

      function updateNetworkUI() {
        const online = navigator.onLine;
        statusEl.textContent = online ? 'Online' : 'Offline';
        statusEl.classList.toggle('offline', !online);
        if (!online) {
          offlineModal.classList.remove('hidden');
        }
      }

      function hideOfflineModal() {
        offlineModal.classList.add('hidden');
      }

      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.btn[data-link]').forEach((btn) => {
          const key = btn.getAttribute('data-link');
          const url = links[key];
          if (url) {
            btn.href = url;
          }

          btn.addEventListener('click', (event) => {
            if (!navigator.onLine) {
              event.preventDefault();
              offlineModal.classList.remove('hidden');
              return;
            }

            event.preventDefault();
            hideOfflineModal();
            window.location.assign(url);
          });
        });

        retryBtn.addEventListener('click', () => {
          if (navigator.onLine) {
            hideOfflineModal();
          } else {
            offlineModal.classList.remove('hidden');
          }
        });

        window.addEventListener('online', updateNetworkUI);
        window.addEventListener('offline', updateNetworkUI);
        updateNetworkUI();
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js').catch(console.error);
        });
      }
    </script>
  </body>
</html>
